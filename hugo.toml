baseURL = 'https://j9smith.github.io/'
languageCode = 'en-us'
title = 'Joel Smith'
theme = 'typo'

# Syntax highlight on code blocks
[markup]
  [markup.highlight]
    noClasses = false
    style = "github"
 [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

    [markup.goldmark.extensions]
      math = true

    [markup.goldmark.extensions.passthrough]
      enable = true

    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [['$$', '$$']]
      inline = [['$', '$']]

[taxonomies]
tag = 'tags'

[params]
# Meta description
description = "My personal website"

# Appearance settings
theme = 'light'
hideHeader = false
showFooter = false
favicon = "/favicon.ico"
colorPalette = 'custom'



# Intro on main page, content is markdown
 #homeIntroTitle = 'About'
homeIntroContent = """
<div class="home-hero">
  <div class="home-avatar-wrap">
    <img src="/images/Untitled.jpeg" alt="Joel Smith" class="home-avatar" />
  </div>

  <div class="home-hero__text">
    <p>Hi, I'm Joel 👋 I'm a machine learning engineer with a particular interest in the systems and engineering required to run models efficiently at scale -- feel free to reach out to chat about anything ML!</p>
  </div>
</div>
"""



# Collection to display on home
homeCollectionTitle = 'Posts'
homeCollection = 'posts'

# Lists parameters
paginationSize = 100
listSummaries = true
listDateFormat = '2 Jan 2006'

# Breadcrumbs
[params.breadcrumbs]
enabled = false
showCurrentPage = true
home = "home"

